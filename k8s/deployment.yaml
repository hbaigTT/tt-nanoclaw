apiVersion: apps/v1
kind: Deployment
metadata:
  name: tt-nanoclaw
  namespace: monitoring
  labels:
    app: tt-nanoclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tt-nanoclaw
  template:
    metadata:
      labels:
        app: tt-nanoclaw
    spec:
      serviceAccountName: tt-nanoclaw
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: tt-nanoclaw
          # Image tags:
          #   dev        — current main branch (dev cluster default)
          #   pr-<number>  — PR preview, test with: kubectl set image deploy/tt-nanoclaw tt-nanoclaw=ghcr.io/hbaigtt/tt-nanoclaw:pr-123
          #   v1.0.0       — semver release (for prod)
          image: ghcr.io/hbaigtt/tt-nanoclaw:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tt-nanoclaw
                  key: ANTHROPIC_API_KEY
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: tt-nanoclaw
                  key: SLACK_WEBHOOK_URL
                  optional: true
          # No KUBECONFIG — in-cluster ServiceAccount auth is automatic
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
