# Roles and RoleBindings in each namespace the agent can access.
# A Role in monitoring cannot authorize access to other namespaces —
# each target namespace needs its own Role+RoleBinding, binding to
# the tt-nanoclaw ServiceAccount in monitoring.
#
# To add a new namespace: copy a Role+RoleBinding block below, change
# the namespace, and update ALLOWED_NAMESPACES in src/mcp/kubectl-server.ts.

# --- kube-system ---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tt-nanoclaw
  namespace: kube-system
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tt-nanoclaw
  namespace: kube-system
subjects:
  - kind: ServiceAccount
    name: tt-nanoclaw
    namespace: monitoring
roleRef:
  kind: Role
  name: tt-nanoclaw
  apiGroup: rbac.authorization.k8s.io
---
