# This deployment creates a pod that crashes because it can't find
# a config file. The ConfigMap with the config exists in the namespace,
# but the Deployment is missing the volume mount.
#
# The agent should see:
#   - Logs: "ERROR: /config/app.conf not found"
#   - ConfigMap demo-app-config exists in the namespace
#   - The Deployment doesn't mount it (misconfiguration)
#   - This looks like a transient/recoverable issue — delete the pod
#
# After the agent deletes the pod, manually fix the Deployment:
#   kubectl -n demo patch deployment demo-transient --type=strategic -p '{...}'
# The replacement pod will mount the ConfigMap and start successfully.

apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-config
  namespace: demo
data:
  app.conf: |
    database_host=db.demo.svc
    database_port=5432
    log_level=info
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-transient
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-transient
  template:
    metadata:
      labels:
        app: demo-transient
    spec:
      containers:
        - name: demo-transient
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              echo "Starting app..."
              if [ -f /config/app.conf ]; then
                echo "Config loaded successfully"
                echo "App running"
                sleep 3600
              else
                echo "ERROR: /config/app.conf not found - config not mounted"
                echo "Expected ConfigMap demo-app-config to be mounted at /config"
                exit 1
              fi
