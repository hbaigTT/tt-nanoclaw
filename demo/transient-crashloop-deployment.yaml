# Pod that crashes due to a stale lock file from a previous unclean shutdown.
# Deleting the pod clears the ephemeral filesystem, removing the lock.
# The replacement pod starts clean and runs indefinitely.
#
# How it works:
# - On start, checks for /tmp/app.lock
# - If lock exists: logs error and exits (stale state from prior crash)
# - If no lock: creates lock, runs successfully, sleeps forever
# - Container restarts reuse /tmp (same pod), so lock persists → crash loop
# - Pod delete = new /tmp = no lock = clean start

apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-transient
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-transient
  template:
    metadata:
      labels:
        app: demo-transient
    spec:
      initContainers:
        - name: create-lock
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              echo "$$@$(date -u +%Y-%m-%dT%H:%M:%SZ)" > /tmp/app.lock
              echo "Lock file created (simulating unclean prior shutdown)"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: demo-transient
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              if [ -f /tmp/app.lock ]; then
                echo "ERROR: Stale lock file /tmp/app.lock found from previous instance"
                echo "Process cannot start - another instance may still be running or exited uncleanly"
                echo "Lock contents: $(cat /tmp/app.lock)"
                exit 1
              fi
              echo "App started successfully (PID $$)"
              echo "App running"
              sleep 3600
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
