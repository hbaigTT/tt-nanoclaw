# Pod that crashes if a stale PID file exists in its data volume.
# Normal startup does NOT create a PID file.
# The app polls for a "crash trigger" file — when it appears, the app
# writes a PID file and crashes (simulating an unclean shutdown).
# Subsequent restarts find the PID file and fail immediately.
# Deleting the pod = fresh emptyDir = no PID file = runs clean.

apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-transient-scripts
  namespace: demo
data:
  start.sh: |
    #!/bin/sh
    PID_FILE="/data/app.pid"

    if [ -f "$PID_FILE" ]; then
      OLD_PID=$(cat "$PID_FILE")
      echo "ERROR: Found stale PID file at $PID_FILE (PID: $OLD_PID)"
      echo "Previous instance did not shut down cleanly."
      echo "Cannot acquire lock — another instance may still be running."
      exit 1
    fi

    echo "App started successfully (PID: $$)"
    echo "Connected to upstream services"
    echo "Listening on port 8080"

    while true; do
      if [ -f /data/crash-trigger ]; then
        echo "FATAL: Unexpected error in worker thread"
        echo $$ > "$PID_FILE"
        exit 1
      fi
      sleep 1
    done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-transient
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-transient
  template:
    metadata:
      labels:
        app: demo-transient
    spec:
      containers:
        - name: demo-transient
          image: busybox:latest
          command: ["sh", "/scripts/start.sh"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: data
              mountPath: /data
      volumes:
        - name: scripts
          configMap:
            name: demo-transient-scripts
        - name: data
          emptyDir: {}
