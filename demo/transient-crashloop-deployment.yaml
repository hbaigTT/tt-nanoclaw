# Pod that enters CrashLoopBackOff due to a stale lock file.
# After the agent deletes the pod, the demo script patches out the
# initContainer, so the replacement starts clean and runs indefinitely.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-transient
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-transient
  template:
    metadata:
      labels:
        app: demo-transient
    spec:
      initContainers:
        - name: seed-crash
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              echo "$$@$(date -u +%Y-%m-%dT%H:%M:%SZ)" > /tmp/app.lock
              echo "Seeded stale lock file"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: demo-transient
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              if [ -f /tmp/app.lock ]; then
                echo "ERROR: Stale lock file /tmp/app.lock found from previous instance"
                echo "Process cannot start - another instance may still be running or exited uncleanly"
                echo "Lock contents: $(cat /tmp/app.lock)"
                exit 1
              fi
              echo "App started successfully (PID $$)"
              echo "App running"
              sleep 3600
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
