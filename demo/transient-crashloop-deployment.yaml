# Pod that crashes due to a stale PID file from a previous unclean shutdown.
# Deleting the pod clears the ephemeral filesystem, removing the PID file.
# The replacement pod starts clean and runs indefinitely.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-transient
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-transient
  template:
    metadata:
      labels:
        app: demo-transient
    spec:
      containers:
        - name: demo-transient
          image: busybox:latest
          command: ["sh", "/scripts/start.sh"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: data
              mountPath: /data
      volumes:
        - name: scripts
          configMap:
            name: demo-transient-scripts
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-transient-scripts
  namespace: demo
data:
  start.sh: |
    #!/bin/sh
    PID_FILE="/data/app.pid"

    if [ -f "$PID_FILE" ]; then
      OLD_PID=$(cat "$PID_FILE")
      echo "ERROR: Found stale PID file at $PID_FILE (PID: $OLD_PID)"
      echo "Previous instance did not shut down cleanly."
      echo "Cannot acquire lock — another instance may still be running."
      exit 1
    fi

    echo $$ > "$PID_FILE"
    echo "App started successfully (PID: $$)"
    echo "Connected to upstream services"
    echo "Listening on port 8080"
    sleep 3600
