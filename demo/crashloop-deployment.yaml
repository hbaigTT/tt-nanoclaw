apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: busybox:latest
          command: ["sh", "-c", "echo 'Starting demo-app...' && echo 'ERROR: Failed to connect to database at db.demo.svc:5432 - Connection refused' && exit 1"]
